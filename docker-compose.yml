services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mrb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mrb
      POSTGRES_PASSWORD: mrb_secret
      POSTGRES_DB: move_reino_bible
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrb -d move_reino_bible"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mrb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: mrb-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: mrb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  qdrant_data:
